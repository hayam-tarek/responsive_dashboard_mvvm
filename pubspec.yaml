name: responsive_dashboard_mvvm
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  bloc: ^9.2.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.14.1
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/svgs/

flutter_gen:
  output: lib/core/gen/
  line_length: 80
  integrations:
    flutter_svg: true
